<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>#modaniregime</title>
  <meta name="description" content="modaniregime.com">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #0f0f0f;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, sans-serif;
    }

    main {
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      position: relative;
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
    }

    .hero img {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .actions {
      flex: 0 0 auto;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0.75rem 1rem 1rem;
    }

    a.video-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.5rem;
      background: #cc0000;
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      border-radius: 4px;
      transition: background 0.15s ease;
    }

    a.video-link:hover {
      background: #a30000;
    }

    a.video-link svg {
      flex-shrink: 0;
    }

    footer {
      flex: 0 0 auto;
      width: 100%;
      padding: 1rem clamp(1rem, 4vw, 2rem) 1.25rem;
      border-top: 1px solid #333;
      text-align: center;
      font-size: clamp(0.75rem, 2vw, 0.875rem);
      line-height: 1.6;
      color: #aaa;
    }

    footer strong {
      display: block;
      margin-bottom: 0.35rem;
      color: #ccc;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <img src="modani-regime.webp" alt="#modaniregime" width="1024" height="768">
    </div>

    <div class="actions">
      <a class="video-link" href="https://www.youtube.com/watch?v=BtXxtB-AZA8" target="_blank" rel="noopener noreferrer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.6 31.6 0 0 0 0 12a31.6 31.6 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.6 31.6 0 0 0 24 12a31.6 31.6 0 0 0-.5-5.8zM9.7 15.5V8.5L15.9 12l-6.2 3.5z"/>
        </svg>
        The Prophesy
      </a>
    </div>
  </main>

  <footer>
    <strong>Disclaimer</strong>
    This site is political satire. Nothing on this page — including the image, video, or any implied message — should be taken literally or as factual reporting.
  </footer>
</body>
</html>
